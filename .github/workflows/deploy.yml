name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN に Pages デプロイ（OIDC）権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1本に集約。進行中のデプロイは中断しない（公開の取りこぼし防止）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version   # 24.18.0（ローカルと同一）
          cache: npm

      # CI検証ゲート（ci:check）が使う sqlite3 CLI を明示導入（ubuntu-latest 標準搭載だが依存を明示）。
      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # npm run build = ci:check（違反行でビルド失敗）→ astro build。
      # ci:check は sqlite3 CLI で db/melothea.db を検査する。
      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
